<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cox Dash</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Segoe UI', Arial, sans-serif;
  overflow: hidden;
}
#game-container {
  position: relative;
  width: 800px;
  height: 400px;
}
#canvas {
  display: block;
  border-radius: 8px;
  border: 2px solid #333;
}
#hud {
  position: absolute;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 22px;
  font-weight: bold;
  color: #fff;
  text-shadow: 2px 2px 6px rgba(0,0,0,0.9);
  pointer-events: none;
  z-index: 10;
  background: rgba(0,0,0,0.45);
  padding: 4px 18px;
  border-radius: 20px;
}
.overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: rgba(10,10,26,0.92);
  border-radius: 6px;
  z-index: 20;
  color: #fff;
}
.overlay h1 {
  font-size: 52px;
  font-weight: 900;
  color: #e84393;
  text-shadow: 3px 3px 0 #000, 0 0 30px rgba(232,67,147,0.5);
  margin-bottom: 4px;
  letter-spacing: 3px;
}
.tagline {
  font-size: 15px;
  color: #aaa;
  margin-bottom: 18px;
  font-style: italic;
}
.controls-hint {
  font-size: 13px;
  color: #ccc;
  margin-bottom: 22px;
  text-align: center;
  line-height: 2;
  background: rgba(255,255,255,0.06);
  padding: 8px 20px;
  border-radius: 8px;
}
.btn {
  background: #e84393;
  color: #fff;
  border: none;
  padding: 12px 44px;
  font-size: 20px;
  font-weight: bold;
  border-radius: 30px;
  cursor: pointer;
  letter-spacing: 1px;
  transition: background 0.15s, transform 0.1s;
  margin-bottom: 12px;
  box-shadow: 0 4px 20px rgba(232,67,147,0.4);
}
.btn:hover { background: #c4306f; transform: scale(1.05); }
.leaderboard { width: 280px; margin-top: 8px; }
.leaderboard h3 {
  font-size: 13px;
  text-align: center;
  color: #e84393;
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.leaderboard ol { list-style: none; padding: 0; }
.leaderboard li {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  padding: 3px 10px;
  border-radius: 4px;
  color: #ccc;
}
.leaderboard li.current {
  background: rgba(232,67,147,0.3);
  color: #fff;
  font-weight: bold;
}
.final-score {
  font-size: 40px;
  font-weight: 900;
  color: #ffd700;
  margin-bottom: 4px;
  text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
}
.died-msg {
  font-size: 14px;
  color: #ff6b6b;
  margin-bottom: 18px;
}
.restart-hint {
  font-size: 12px;
  color: #666;
  margin-top: 6px;
}
.hidden { display: none !important; }

@keyframes fadeUp {
  0%   { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  100% { opacity: 0; transform: translate(-50%, -130%) scale(1.4); }
}
@keyframes jukeFlash {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
</style>
</head>
<body>
<div id="game-container">
  <canvas id="canvas" width="800" height="400"></canvas>
  <div id="hud">🏃 Steps: <span id="step-display">0</span></div>

  <div id="start-screen" class="overlay">
    <h1>COX DASH</h1>
    <div class="tagline">Don't get caught by your manager</div>
    <div class="controls-hint">
      SPACE / ↑ &nbsp;Jump &nbsp;|&nbsp; ↓ &nbsp;Duck<br>
      ← then → quickly &nbsp;Juke Alex Taylor
    </div>
    <button class="btn" id="start-btn">START</button>
    <div id="start-leaderboard" class="leaderboard hidden"></div>
  </div>

  <div id="gameover-screen" class="overlay hidden">
    <div class="final-score">🏃 <span id="final-steps">0</span> steps</div>
    <div class="died-msg" id="died-msg"></div>
    <button class="btn" id="restart-btn">PLAY AGAIN</button>
    <div class="restart-hint">or press SPACE</div>
    <div id="gameover-leaderboard" class="leaderboard"></div>
  </div>
</div>

<script>
// ── CONSTANTS ──────────────────────────────────────────────────────────────
const W = 800, H = 400;
const GROUND = 310;
const PLAYER_X = 150;
const GRAVITY = 1750;
const JUMP_VEL = -660;
const STEP_RATE = 4;
const LS_KEY = 'coxdash_v1';

// ── STATE ──────────────────────────────────────────────────────────────────
let state = 'idle';
let steps = 0;
let deltaMultiplier = 1;
let lastTime = 0;
let particles = [];
let shakeTimer = 0;
let shakeAmt = 0;
let bgFar = 0, bgNear = 0;
let obstacles = [];
let obstacleTimer = 0;
let activeChasers = [];
let alexObj = null;
let jukeState = 0;   // 0=idle 1=got-left
let jukeTimer = 0;
const JUKE_WINDOW = 0.42;
let scores = [];
let lastCurrentScore = null;

// ── PLAYER ─────────────────────────────────────────────────────────────────
const player = {
  x: PLAYER_X, y: GROUND - 60,
  w: 40, h: 60,
  vy: 0, onGround: true, ducking: false,
  frame: 0, frameTimer: 0,
};

// ── DOM ─────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const stepDisplay = document.getElementById('step-display');
const startScreen = document.getElementById('start-screen');
const gameoverScreen = document.getElementById('gameover-screen');
const finalStepsEl = document.getElementById('final-steps');
const diedMsgEl = document.getElementById('died-msg');
const startLB = document.getElementById('start-leaderboard');
const gameoverLB = document.getElementById('gameover-leaderboard');

// ── BACKGROUND ─────────────────────────────────────────────────────────────
function drawBackground(rawDt) {
  const spd = 160 * deltaMultiplier;
  bgFar  = (bgFar  + spd * 0.38 * rawDt) % W;
  bgNear = (bgNear + spd * rawDt) % W;

  // Wall
  ctx.fillStyle = '#d6cabb';
  ctx.fillRect(0, 0, W, GROUND);

  // Far layer: windows, cubicle dividers, poster
  for (let i = -1; i < 2; i++) {
    const ox = i * W - bgFar;

    // cubicle dividers
    ctx.fillStyle = '#b5a494';
    for (let j = 0; j < 4; j++) {
      ctx.fillRect(ox + j * 210 + 50, 70, 7, 210);
    }

    // windows
    for (let j = 0; j < 3; j++) {
      const wx = ox + j * 250 + 70;
      ctx.fillStyle = '#a8d8f0';
      ctx.fillRect(wx, 55, 110, 90);
      ctx.strokeStyle = '#7a9aaa';
      ctx.lineWidth = 2;
      ctx.strokeRect(wx, 55, 110, 90);
      ctx.beginPath();
      ctx.moveTo(wx + 55, 55); ctx.lineTo(wx + 55, 145);
      ctx.moveTo(wx, 100); ctx.lineTo(wx + 110, 100);
      ctx.stroke();
      // blinds
      ctx.strokeStyle = 'rgba(255,255,255,0.25)';
      ctx.lineWidth = 1;
      for (let b = 0; b < 6; b++) {
        ctx.beginPath();
        ctx.moveTo(wx, 58 + b * 14);
        ctx.lineTo(wx + 110, 58 + b * 14);
        ctx.stroke();
      }
    }

    // motivational poster
    ctx.fillStyle = '#f0e4c8';
    ctx.fillRect(ox + 380, 85, 85, 58);
    ctx.strokeStyle = '#8B6914'; ctx.lineWidth = 2;
    ctx.strokeRect(ox + 380, 85, 85, 58);
    ctx.fillStyle = '#5a3e00';
    ctx.font = 'bold 7px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('SYNERGY', ox + 422, 113);
    ctx.font = '6px Arial';
    ctx.fillText('Move fast & break things', ox + 422, 126);
    ctx.textAlign = 'left';
  }

  // Floor
  ctx.fillStyle = '#c8b898';
  ctx.fillRect(0, GROUND, W, H - GROUND);

  // Near layer: floor tiles
  for (let i = -1; i < 2; i++) {
    const ox = i * W - bgNear;
    ctx.strokeStyle = '#b09878';
    ctx.lineWidth = 1;
    for (let j = 0; j < 7; j++) {
      ctx.strokeRect(ox + j * 120, GROUND, 120, H - GROUND);
    }
  }

  // Ground line
  ctx.fillStyle = '#7a6040';
  ctx.fillRect(0, GROUND, W, 4);

  // Ceiling
  ctx.fillStyle = '#e8e2d8';
  ctx.fillRect(0, 0, W, 12);

  // Ceiling lights
  for (let i = -1; i < 2; i++) {
    const ox = i * W - bgNear * 0.55;
    for (let j = 0; j < 4; j++) {
      ctx.fillStyle = '#fffde0';
      ctx.fillRect(ox + j * 220 + 25, 0, 90, 10);
      ctx.fillStyle = 'rgba(255,253,200,0.18)';
      ctx.fillRect(ox + j * 220 + 25, 10, 90, 30);
    }
  }
}

// ── CHARACTER DRAWING ───────────────────────────────────────────────────────
function drawPerson(x, y, w, h, skin, shirt, pants, frame, ducking) {
  const cx = x + w / 2;
  const headR = w * 0.27;
  const torsoH = h * 0.33;
  const legH = h * 0.33;

  if (ducking) {
    const dh = h * 0.52;
    const dy = y + h - dh;
    ctx.fillStyle = shirt;
    ctx.fillRect(x + 3, dy + headR * 1.6, w - 6, dh * 0.38);
    ctx.fillStyle = skin;
    ctx.beginPath(); ctx.arc(cx, dy + headR, headR, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = pants;
    ctx.fillRect(x, dy + dh * 0.48, w, dh * 0.42);
    return;
  }

  // Head
  ctx.fillStyle = skin;
  ctx.beginPath(); ctx.arc(cx, y + headR, headR, 0, Math.PI * 2); ctx.fill();

  // Torso
  ctx.fillStyle = shirt;
  ctx.fillRect(x + 4, y + headR * 2, w - 8, torsoH);

  // Arms
  const swing = frame === 0 ? -0.45 : 0.45;
  ctx.strokeStyle = shirt; ctx.lineWidth = 5; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(cx, y + headR * 2 + 4);
  ctx.lineTo(cx + Math.cos(swing) * 16, y + headR * 2 + torsoH * 0.55 + Math.sin(swing) * 10);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx, y + headR * 2 + 4);
  ctx.lineTo(cx - Math.cos(swing) * 16, y + headR * 2 + torsoH * 0.55 - Math.sin(swing) * 10);
  ctx.stroke();

  // Legs
  ctx.fillStyle = pants;
  const lo = frame === 0 ? 10 : -10;
  ctx.fillRect(x + 4,       y + headR * 2 + torsoH, (w - 10) / 2, legH + lo);
  ctx.fillRect(cx + 1,      y + headR * 2 + torsoH, (w - 10) / 2, legH - lo);

  // Shoes
  ctx.fillStyle = '#222';
  ctx.fillRect(x + 2,       y + headR * 2 + torsoH + legH + lo - 2, (w - 10) / 2 + 4, 6);
  ctx.fillRect(cx - 1,      y + headR * 2 + torsoH + legH - lo - 2, (w - 10) / 2 + 4, 6);
}

function drawNameTag(name, title, cx, topY) {
  ctx.font = 'bold 9px Arial';
  const nw = Math.max(ctx.measureText(name).width, ctx.measureText(`"${title}"`).width) + 12;
  const bx = cx - nw / 2;
  const by = topY - 30;

  ctx.fillStyle = 'rgba(0,0,0,0.72)';
  ctx.beginPath();
  if (ctx.roundRect) ctx.roundRect(bx, by, nw, 26, 4);
  else ctx.rect(bx, by, nw, 26);
  ctx.fill();

  ctx.textAlign = 'center';
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 9px Arial';
  ctx.fillText(name, cx, by + 11);
  ctx.fillStyle = '#ffd700';
  ctx.font = '8px Arial';
  ctx.fillText(`"${title}"`, cx, by + 22);
  ctx.textAlign = 'left';
}

// ── PLAYER UPDATE & DRAW ───────────────────────────────────────────────────
function updatePlayer(dt) {
  player.frameTimer += dt;
  if (player.frameTimer >= 0.11) {
    player.frameTimer = 0;
    player.frame = 1 - player.frame;
  }
  if (!player.onGround) {
    player.vy += GRAVITY * dt;
    player.y += player.vy * dt;
    if (player.y >= GROUND - player.h) {
      player.y = GROUND - player.h;
      player.vy = 0;
      player.onGround = true;
    }
  }
}

function drawPlayer() {
  const py = player.ducking ? GROUND - player.h * 0.52 : player.y;
  const ph = player.ducking ? player.h * 0.52 : player.h;
  drawPerson(player.x, py, player.w, ph, '#FDBCB4', '#1a6bcc', '#22224a', player.frame, player.ducking);
  drawNameTag('Intern Noob', 'The Chosen One', player.x + player.w / 2, py);
}

function playerHitbox() {
  if (player.ducking) return { x: player.x + 5, y: GROUND - player.h * 0.52, w: player.w - 10, h: player.h * 0.52 };
  return { x: player.x + 5, y: player.y, w: player.w - 10, h: player.h };
}

// ── OBSTACLE DRAW FNS ──────────────────────────────────────────────────────
function drawChair(x, y, w, h) {
  // base star
  ctx.fillStyle = '#333';
  for (let i = 0; i < 5; i++) {
    const a = (i / 5) * Math.PI * 2;
    ctx.fillRect(x + w / 2 + Math.cos(a) * 14 - 2, y + h * 0.88, 4, 6);
  }
  // wheels
  for (let i = 0; i < 3; i++) {
    ctx.beginPath();
    ctx.arc(x + 8 + i * (w - 16) / 2, y + h - 2, 4, 0, Math.PI * 2);
    ctx.fillStyle = '#111'; ctx.fill();
  }
  // pole
  ctx.fillStyle = '#555';
  ctx.fillRect(x + w / 2 - 3, y + h * 0.5, 6, h * 0.38);
  // seat
  ctx.fillStyle = '#444';
  ctx.fillRect(x + 3, y + h * 0.42, w - 6, h * 0.18);
  // back
  ctx.fillStyle = '#3a3a3a';
  ctx.fillRect(x + w * 0.55, y + h * 0.05, w * 0.22, h * 0.4);
  // lumbar bump
  ctx.beginPath();
  ctx.arc(x + w * 0.66, y + h * 0.25, 6, 0, Math.PI * 2);
  ctx.fillStyle = '#555'; ctx.fill();
}

function drawPapers(x, y, w, h) {
  for (let i = 4; i >= 0; i--) {
    ctx.fillStyle = i % 2 === 0 ? '#f8f8f0' : '#ececdf';
    ctx.fillRect(x + i * 1.5, y + i * 3.5, w - i, h * 0.16);
    ctx.strokeStyle = '#ccc'; ctx.lineWidth = 0.5;
    ctx.strokeRect(x + i * 1.5, y + i * 3.5, w - i, h * 0.16);
  }
  ctx.fillStyle = '#bbb';
  for (let r = 0; r < 5; r++) ctx.fillRect(x + 4, y + r * 7 + 2, w * 0.65, 2);
  ctx.fillStyle = '#e84393';
  ctx.font = 'bold 6px Arial'; ctx.textAlign = 'left';
  ctx.fillText('PERF REVIEW', x + 3, y + 10);
}

function drawMug(x, y, w, h) {
  ctx.fillStyle = '#e84393';
  ctx.beginPath();
  ctx.roundRect ? ctx.roundRect(x, y, w - 6, h, 4) : ctx.rect(x, y, w - 6, h);
  ctx.fill();
  // handle
  ctx.strokeStyle = '#c4306f'; ctx.lineWidth = 4; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.arc(x + w - 5, y + h / 2, h * 0.3, -Math.PI * 0.5, Math.PI * 0.5);
  ctx.stroke();
  // logo
  ctx.fillStyle = '#fff'; ctx.font = 'bold 8px Arial'; ctx.textAlign = 'center';
  ctx.fillText('CAI', x + (w - 6) / 2, y + h * 0.62);
  ctx.textAlign = 'left';
  // steam
  ctx.strokeStyle = 'rgba(220,220,220,0.6)'; ctx.lineWidth = 2;
  for (let i = 0; i < 2; i++) {
    ctx.beginPath();
    ctx.moveTo(x + 7 + i * 9, y - 2);
    ctx.bezierCurveTo(x + 5 + i * 9, y - 10, x + 11 + i * 9, y - 15, x + 9 + i * 9, y - 22);
    ctx.stroke();
  }
}

function drawPrinter(x, y, w, h) {
  ctx.fillStyle = '#ddd';
  ctx.fillRect(x, y + h * 0.25, w, h * 0.6);
  ctx.fillStyle = '#aaa';
  ctx.fillRect(x + 4, y + h * 0.32, w - 8, h * 0.12);
  // pages spitting out
  for (let i = 0; i < 3; i++) {
    ctx.fillStyle = '#fff';
    ctx.fillRect(x + 6, y - i * 8, w - 12, 12);
    ctx.strokeStyle = '#ddd'; ctx.lineWidth = 0.5;
    ctx.strokeRect(x + 6, y - i * 8, w - 12, 12);
  }
  ctx.fillStyle = '#1a6bcc'; ctx.font = 'bold 6px Arial'; ctx.textAlign = 'center';
  ctx.fillText('PRINTING...', x + w / 2, y + h * 0.62);
  ctx.textAlign = 'left';
}

function drawLaptop(x, y, w, h) {
  // screen
  ctx.fillStyle = '#2c2c2c';
  ctx.fillRect(x, y, w, h * 0.62);
  ctx.fillStyle = '#1a6bcc';
  ctx.fillRect(x + 3, y + 3, w - 6, h * 0.62 - 8);
  ctx.fillStyle = '#fff'; ctx.font = '7px Arial'; ctx.textAlign = 'center';
  ctx.fillText('147 UNREAD', x + w / 2, y + h * 0.35);
  ctx.textAlign = 'left';
  // base
  ctx.fillStyle = '#444';
  ctx.fillRect(x - 3, y + h * 0.62, w + 6, h * 0.18);
}

function drawBanner(x, y, w, h) {
  // ropes
  ctx.strokeStyle = '#888'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(x + 15, y); ctx.lineTo(x + 15, y - 35);
  ctx.moveTo(x + w - 15, y); ctx.lineTo(x + w - 15, y - 35);
  ctx.stroke();

  // banner body
  ctx.fillStyle = '#e84393';
  ctx.fillRect(x, y, w, h);
  // fold lines
  ctx.fillStyle = '#c4306f';
  ctx.fillRect(x, y, w, 4);
  ctx.fillRect(x, y + h - 4, w, 4);

  ctx.fillStyle = '#fff'; ctx.font = 'bold 10px Arial'; ctx.textAlign = 'center';
  ctx.fillText('🏆  HUSTLE HARDER  🏆', x + w / 2, y + h * 0.68);
  ctx.textAlign = 'left';
}

function drawMonitor(x, y, w, h) {
  // arm from ceiling
  ctx.strokeStyle = '#666'; ctx.lineWidth = 7; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(x + w * 0.7, y - 40); ctx.lineTo(x + w * 0.5, y);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x + w * 0.5, y); ctx.lineTo(x + w * 0.5, y + h * 0.2);
  ctx.stroke();

  // monitor
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(x, y, w, h * 0.8);
  ctx.fillStyle = '#0d0d2e';
  ctx.fillRect(x + 3, y + 3, w - 6, h * 0.8 - 6);
  ctx.fillStyle = '#ff4444'; ctx.font = 'bold 8px Arial'; ctx.textAlign = 'center';
  ctx.fillText('47 OVERDUE', x + w / 2, y + h * 0.44);
  ctx.textAlign = 'left';
}

// ── OBSTACLES ──────────────────────────────────────────────────────────────
const OB_TYPES = [
  { id: 'chair',   kind: 'jump', w: 50, h: 52, drawFn: drawChair,   yo: 0   },
  { id: 'papers',  kind: 'jump', w: 32, h: 44, drawFn: drawPapers,  yo: 0   },
  { id: 'mug',     kind: 'jump', w: 30, h: 38, drawFn: drawMug,     yo: 0   },
  { id: 'printer', kind: 'jump', w: 48, h: 56, drawFn: drawPrinter, yo: 0   },
  { id: 'laptop',  kind: 'duck', w: 52, h: 34, drawFn: drawLaptop,  yo: -100 },
  { id: 'banner',  kind: 'duck', w: 130,h: 26, drawFn: drawBanner,  yo: -100 },
  { id: 'monitor', kind: 'duck', w: 46, h: 44, drawFn: drawMonitor, yo: -96  },
];

function spawnObstacle() {
  const pool = OB_TYPES.filter(t => t.kind === 'jump' || steps > 600);
  const def = pool[Math.floor(Math.random() * pool.length)];
  obstacles.push({ ...def, x: W + 20, y: GROUND - def.h + def.yo });
}

function updateObstacles(dt) {
  const speed = (230 + steps * 0.028) * deltaMultiplier;
  obstacleTimer += dt / deltaMultiplier; // use raw time for spawn interval
  const interval = Math.max(0.85, 2.2 - steps * 0.00013);
  if (obstacleTimer >= interval) {
    obstacleTimer = 0;
    spawnObstacle();
  }
  for (const ob of obstacles) ob.x -= speed * dt;
  obstacles = obstacles.filter(ob => ob.x + ob.w > -20);
}

function drawObstacles() {
  for (const ob of obstacles) ob.drawFn(ob.x, ob.y, ob.w, ob.h);
}

// ── CHASERS ────────────────────────────────────────────────────────────────
const CHASER_DEFS = [
  { name: 'Nick',   title: 'Iron Man',         ms: 1000, spd: 88,  shirt: '#4a9eff', pants: '#1a1a3e' },
  { name: 'Nikki',  title: 'The Pace Killer',  ms: 2000, spd: 112, shirt: '#ff6b9d', pants: '#2a0020' },
  { name: 'Sam',    title: 'HR is Watching',   ms: 3500, spd: 138, shirt: '#f97316', pants: '#1a1a1a' },
  { name: 'Andrew', title: 'Mandatory 1on1',   ms: 5000, spd: 168, shirt: '#a855f7', pants: '#0d0020' },
];
const ALEX_DEF = {
  name: 'Alex Taylor', title: 'The Quarterly Review',
  ms: 7500, shirt: '#ff2244', pants: '#5a0000',
};
let alexBaseSpeed = 220;

function updateChasers(dt) {
  // Spawn regular chasers
  for (const def of CHASER_DEFS) {
    if (steps >= def.ms && !activeChasers.find(c => c.name === def.name)) {
      activeChasers.push({ ...def, x: -90, frame: 0, frameTimer: 0 });
    }
  }

  // Spawn Alex
  if (steps >= ALEX_DEF.ms && !alexObj) {
    alexObj = { ...ALEX_DEF, x: -100, frame: 0, frameTimer: 0, flying: false, flyVy: 0, flyTimer: 0, y: GROUND - 64 };
  }

  const px = player.x;

  for (const c of activeChasers) {
    c.frameTimer += dt;
    if (c.frameTimer >= 0.1) { c.frameTimer = 0; c.frame = 1 - c.frame; }
    c.x += c.spd * deltaMultiplier * dt;
    if (c.x > px - 5) c.x = px - 5;
  }

  if (alexObj) {
    alexObj.frameTimer += dt;
    if (alexObj.frameTimer >= 0.08) { alexObj.frameTimer = 0; alexObj.frame = 1 - alexObj.frame; }

    if (alexObj.flying) {
      alexObj.flyTimer += dt;
      alexObj.x += 380 * dt;
      alexObj.flyVy += 900 * dt;
      alexObj.y += alexObj.flyVy * dt;
      if (alexObj.flyTimer > 1.0) {
        alexObj = null;
        jukeState = 0;
        deltaMultiplier = 1;
        alexBaseSpeed = Math.min(alexBaseSpeed + 25, 340);
      }
    } else {
      alexObj.x += alexBaseSpeed * deltaMultiplier * dt;
      if (alexObj.x > px - 5) alexObj.x = px - 5;
    }
  }
}

function drawChasers() {
  for (const c of activeChasers) {
    drawPerson(c.x, GROUND - 60, 38, 60, '#FDBCB4', c.shirt, c.pants, c.frame, false);
    drawNameTag(c.name, c.title, c.x + 19, GROUND - 60);
  }
  if (alexObj) {
    drawPerson(alexObj.x, alexObj.y, 44, 64, '#FDBCB4', alexObj.shirt, alexObj.pants, alexObj.frame, false);
    drawNameTag(alexObj.name, alexObj.title, alexObj.x + 22, alexObj.y);
    if (alexObj.flying) {
      ctx.font = '24px Arial';
      ctx.fillText('💥', alexObj.x + 6, alexObj.y - 8);
    }
  }
}

// ── JUKE ───────────────────────────────────────────────────────────────────
function handleJukeKey(code) {
  if (!alexObj || alexObj.flying) return;
  if (code === 'ArrowLeft' && jukeState === 0) {
    jukeState = 1;
    jukeTimer = JUKE_WINDOW;
  } else if (code === 'ArrowRight' && jukeState === 1) {
    triggerJuke();
  }
}

function updateJuke(rawDt) {
  if (jukeState === 1) {
    jukeTimer -= rawDt;
    if (jukeTimer <= 0) jukeState = 0;
  }
}

function triggerJuke() {
  if (!alexObj) return;
  alexObj.flying = true;
  alexObj.flyVy = -320;
  steps += 500;
  deltaMultiplier = 0.2;

  spawnParticles(player.x + player.w, GROUND - 50, '#ff2244', 24);
  spawnParticles(player.x + player.w, GROUND - 50, '#ffd700', 12);
  triggerShake(10, 0.5);

  const el = document.createElement('div');
  el.textContent = '💨 JUKED! +500 steps!';
  el.style.cssText = 'position:absolute;top:42%;left:50%;transform:translate(-50%,-50%);font-size:26px;font-weight:900;color:#ffd700;text-shadow:2px 2px 8px rgba(0,0,0,0.9);pointer-events:none;z-index:30;animation:fadeUp 1.3s ease forwards;';
  document.getElementById('game-container').appendChild(el);
  setTimeout(() => el.remove(), 1300);

  setTimeout(() => { if (deltaMultiplier < 1) deltaMultiplier = 1; }, 1100);
}

// ── COLLISIONS ─────────────────────────────────────────────────────────────
function rectsOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function checkCollisions() {
  const pb = playerHitbox();

  for (const ob of obstacles) {
    const m = 7;
    if (rectsOverlap(pb, { x: ob.x + m, y: ob.y + m, w: ob.w - m * 2, h: ob.h - m * 2 })) {
      endGame(`Wiped out by the ${ob.id}!`, pb.x + pb.w / 2, pb.y + pb.h / 2);
      return;
    }
  }

  for (const c of activeChasers) {
    if (c.x + 34 >= pb.x) {
      endGame(`Caught by ${c.name} — "${c.title}"!`, c.x + 19, GROUND - 30);
      return;
    }
  }

  if (alexObj && !alexObj.flying && alexObj.x + 40 >= pb.x) {
    endGame('Caught by Alex Taylor — "The Quarterly Review"!', alexObj.x + 22, GROUND - 32);
  }
}

// ── PARTICLES ──────────────────────────────────────────────────────────────
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = 80 + Math.random() * 220;
    particles.push({
      x, y,
      vx: Math.cos(a) * spd,
      vy: Math.sin(a) * spd - 80,
      life: 0.5 + Math.random() * 0.5,
      color,
      r: 2 + Math.random() * 5,
    });
  }
}

function updateParticles(dt) {
  for (const p of particles) {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 420 * dt;
    p.life -= dt;
  }
  particles = particles.filter(p => p.life > 0);
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life / 0.5);
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ── SCREEN SHAKE ───────────────────────────────────────────────────────────
function triggerShake(amt, dur) { shakeAmt = amt; shakeTimer = dur; }

// ── LEADERBOARD ────────────────────────────────────────────────────────────
function loadScores() {
  try { scores = JSON.parse(localStorage.getItem(LS_KEY)) || []; } catch { scores = []; }
}

function saveScore(s) {
  scores.push({ score: s, date: new Date().toLocaleDateString() });
  scores.sort((a, b) => b.score - a.score);
  scores = scores.slice(0, 10);
  localStorage.setItem(LS_KEY, JSON.stringify(scores));
}

function renderLB(container, currentScore) {
  if (!scores.length) { container.innerHTML = ''; container.classList.add('hidden'); return; }
  let highlighted = false;
  let html = '<h3>🏆 Leaderboard</h3><ol>';
  scores.forEach((s, i) => {
    const isCur = currentScore !== null && !highlighted && s.score === currentScore;
    if (isCur) highlighted = true;
    html += `<li class="${isCur ? 'current' : ''}"><span>#${i + 1} &nbsp;${s.score.toLocaleString()} steps</span><span>${s.date}</span></li>`;
  });
  html += '</ol>';
  container.innerHTML = html;
  container.classList.remove('hidden');
}

// ── GAME FLOW ──────────────────────────────────────────────────────────────
function endGame(msg, px, py) {
  if (state !== 'running') return;
  state = 'gameover';
  diedMsgEl.textContent = msg;
  finalStepsEl.textContent = Math.floor(steps).toLocaleString();
  lastCurrentScore = Math.floor(steps);
  saveScore(lastCurrentScore);
  triggerShake(14, 0.45);
  spawnParticles(px || player.x + 20, py || player.y + 20, '#ff6b6b', 32);
  spawnParticles(px || player.x + 20, py || player.y + 20, '#fff', 12);
  setTimeout(() => {
    renderLB(gameoverLB, lastCurrentScore);
    gameoverScreen.classList.remove('hidden');
  }, 600);
}

function startGame() {
  state = 'running';
  steps = 0;
  obstacles = [];
  activeChasers = [];
  alexObj = null;
  jukeState = 0; jukeTimer = 0;
  particles = [];
  shakeTimer = 0; shakeAmt = 0;
  deltaMultiplier = 1;
  obstacleTimer = 0;
  bgFar = 0; bgNear = 0;
  alexBaseSpeed = 220;
  lastCurrentScore = null;

  player.y = GROUND - player.h;
  player.vy = 0;
  player.onGround = true;
  player.ducking = false;
  player.frame = 0;
  player.frameTimer = 0;

  startScreen.classList.add('hidden');
  gameoverScreen.classList.add('hidden');
  canvas.style.transform = '';

  lastTime = performance.now();
  requestAnimationFrame(loop);
}

function showStart() {
  state = 'idle';
  renderLB(startLB, null);
  startScreen.classList.remove('hidden');
  gameoverScreen.classList.add('hidden');
}

// ── MAIN LOOP ──────────────────────────────────────────────────────────────
function loop(ts) {
  if (state !== 'running') return;

  const rawDt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;
  const dt = rawDt * deltaMultiplier;

  // Steps
  steps += STEP_RATE * (1 + steps * 0.00018) * rawDt;
  stepDisplay.textContent = Math.floor(steps).toLocaleString();

  // Shake
  if (shakeTimer > 0) {
    shakeTimer -= rawDt;
    canvas.style.transform = `translate(${(Math.random() - 0.5) * shakeAmt}px,${(Math.random() - 0.5) * shakeAmt}px)`;
  } else {
    canvas.style.transform = '';
  }

  // Render
  drawBackground(rawDt);
  updatePlayer(dt);
  drawPlayer();
  updateObstacles(dt);
  drawObstacles();
  updateChasers(dt);
  drawChasers();
  updateJuke(rawDt);
  updateParticles(dt);
  drawParticles();

  // Speed indicator
  if (steps > 2000) {
    const pct = Math.min((steps - 2000) / 8000, 1);
    ctx.fillStyle = `rgba(255,${Math.floor(100 - pct * 100)},0,${0.15 + pct * 0.2})`;
    ctx.fillRect(0, 0, W, H);
  }

  if (state === 'running') checkCollisions();

  requestAnimationFrame(loop);
}

// ── INPUT ──────────────────────────────────────────────────────────────────
const held = {};
document.addEventListener('keydown', e => {
  if (held[e.code]) return;
  held[e.code] = true;

  if (e.code === 'Space' && state === 'idle')     { startGame(); return; }
  if (e.code === 'Space' && state === 'gameover') { startGame(); return; }

  if (state === 'running') {
    if (e.code === 'Space' || e.code === 'ArrowUp') {
      if (player.onGround && !player.ducking) {
        player.vy = JUMP_VEL;
        player.onGround = false;
      }
    }
    if (e.code === 'ArrowDown') player.ducking = true;
    if (e.code === 'ArrowLeft')  handleJukeKey('ArrowLeft');
    if (e.code === 'ArrowRight') handleJukeKey('ArrowRight');
  }
});

document.addEventListener('keyup', e => {
  held[e.code] = false;
  if (e.code === 'ArrowDown') player.ducking = false;
});

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('restart-btn').addEventListener('click', startGame);

// ── INIT ───────────────────────────────────────────────────────────────────
loadScores();
showStart();
</script>
</body>
</html>
